<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Personal Portfolio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #eee;
            margin: 0; padding: 0;
        }
        header {
            text-align: center;
            padding: 2rem;
            background: #1db954;
        }
        header img {
            width: 150px;
            border-radius: 50%;
            border: 3px solid #eee;
        }
        main {
            padding: 2rem;
            max-width: 900px;
            margin: auto;
        }
        .contact {
            margin-top: 2rem;
            font-style: italic;
        }
    </style>
</head>
<body>
    <header>
        <img src="your-image.jpg" alt="Profile Image" />
        <h1>Your Name</h1>
        <p>Front End Developer | Designer</p>
    </header>
    <main>
        <section>
            <h2>Skills</h2>
            <ul>
                <li>HTML, CSS</li>
                <li>JavaScript Basics</li>
                <li>Responsive Design</li>
                <li>Git & GitHub</li>
            </ul>
        </section>

        <section>
            <h2>Projects</h2>
            <ul>
                <li>Project One - Description and link</li>
                <li>Project Two - Description and link</li>
            </ul>
        </section>

        <section class="contact">
            <h3>Contact Me</h3>
            <p>Email: your.email@example.com</p>
            <p>Phone: +123 456 7890</p>
        </section>
    </main>
</body>
</html>
