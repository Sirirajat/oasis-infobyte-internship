<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Temperature Converter</title>
<style>
  body { font-family: Arial, sans-serif; background: #121212; color: #eee; padding: 2rem; }
  input, select, button { margin: 0.5rem 0; padding: 0.5rem; }
  .result { margin-top: 1rem; font-weight: bold; }
</style>
</head>
<body>
<h1>Temperature Converter</h1>

<label for="tempInput">Enter temperature:</label><br />
<input type="text" id="tempInput" placeholder="e.g. 100" /><br />

<label for="unitInput">Select unit:</label><br />
<select id="unitInput">
  <option value="C">Celsius</option>
  <option value="F">Fahrenheit</option>
  <option value="K">Kelvin</option>
</select><br />

<button onclick="convertTemp()">Convert</button>

<div class="result" id="result"></div>

<script>
function convertTemp() {
  const temp = document.getElementById('tempInput').value;
  const unit = document.getElementById('unitInput').value;
  const resultDiv = document.getElementById('result');
  if (isNaN(temp) || temp === '') {
    resultDiv.innerHTML = 'Please enter a valid number!';
    return;
  }

  const t = parseFloat(temp);
  let c, f, k;

  if (unit === 'C') {
    c = t;
    f = (c * 9/5) + 32;
    k = c + 273.15;
  } else if (unit === 'F') {
    f = t;
    c = (f - 32) * 5/9;
    k = c + 273.15;
  } else {
    k = t;
    c = k - 273.15;
    f = (c * 9/5) + 32;
  }

  resultDiv.innerHTML = `
    Celsius: ${c.toFixed(2)} °C<br />
    Fahrenheit: ${f.toFixed(2)} °F<br />
    Kelvin: ${k.toFixed(2)} K  
  `;
}
</script>
</body>
</html>
