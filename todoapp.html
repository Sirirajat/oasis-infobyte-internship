<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Basic To-Do App</title>
<style>
  body { font-family: Arial, sans-serif; background: #121212; color: #eee; padding: 2rem; }
  input {
    padding: 0.5rem;
    font-size: 1.1rem;
    width: 60%;
  }
  button {
    padding: 0.6rem 1rem;
    margin-left: 0.5rem;
    font-size: 1rem;
  }
  .sections {
    display: flex;
    justify-content: space-between;
    margin-top: 1rem;
  }
  .list {
    width: 45%;
    background: #222;
    padding: 1rem;
    border-radius: 8px;
  }
  ul { list-style: none; padding-left: 0;}
  li {
    padding: 0.5rem;
    background: #333;
    margin-bottom: 0.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .completed { text-decoration: line-through; color: #bbb; }
</style>
</head>
<body>
<h1>To-Do App</h1>
<input type="text" id="todoInput" placeholder="Add a new task..." />
<button onclick="addTask()">Add</button>

<div class="sections">
  <div class="list">
    <h2>Pending Tasks</h2>
    <ul id="pendingList"></ul>
  </div>
  <div class="list">
    <h2>Completed Tasks</h2>
    <ul id="completedList"></ul>
  </div>
</div>

<script>
  const todoInput = document.getElementById('todoInput');
  const pendingList = document.getElementById('pendingList');
  const completedList = document.getElementById('completedList');

  function addTask() {
    const task = todoInput.value.trim();
    if (!task) return;
    const li = createTaskElement(task, false);
    pendingList.appendChild(li);
    todoInput.value = '';
  }

  function createTaskElement(task, completed) {
    const li = document.createElement('li');

    const span = document.createElement('span');
    span.textContent = task;
    if(completed) span.classList.add('completed');

    const buttons = document.createElement('div');

    const completeBtn = document.createElement('button');
    completeBtn.textContent = completed ? 'Undo' : 'Complete';
    completeBtn.onclick = function() {
      if(completed) {
        pendingList.appendChild(li);
        span.classList.remove('completed');
        completeBtn.textContent = 'Complete';
      } else {
        completedList.appendChild(li);
        span.classList.add('completed');
        completeBtn.textContent = 'Undo';
      }
      completed = !completed;
    };

    const deleteBtn = document.createElement('button');
    deleteBtn.textContent = 'Delete';
    deleteBtn.onclick = () => li.remove();

    buttons.appendChild(completeBtn);
    buttons.appendChild(deleteBtn);

    li.appendChild(span);
    li.appendChild(buttons);
    return li;
  }
</script>
</body>
</html>
