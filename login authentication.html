<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Login Authentication</title>
<style>
  body { font-family: Arial, sans-serif; background: #121212; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; }
  form { background: #222; padding: 2rem; border-radius: 8px; width: 300px; }
  input, button { width: 100%; padding: 0.7rem; margin: 0.5rem 0; border: none; border-radius: 4px; }
  button { background: #1db954; color: #121212; font-weight: bold; cursor: pointer; }
  .message { margin-top: 1rem; }
</style>
</head>
<body>

<form id="loginForm">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Username" required />
  <input type="password" id="password" placeholder="Password" required />
  <button type="submit">Login</button>
  <div class="message" id="message"></div>
</form>

<script>
  const users = {
    user1: 'password123',
    user2: 'mypassword'
  };

  const form = document.getElementById('loginForm');
  const message = document.getElementById('message');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    if (users[username] && users[username] === password) {
      message.textContent = 'Login successful!';
      message.style.color = 'lime';
      // Redirect or show secured content here
    } else {
      message.textContent = 'Invalid username or password!';
      message.style.color = 'red';
    }
  });
</script>

</body>
</html>
