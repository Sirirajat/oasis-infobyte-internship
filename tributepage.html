<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tribute Page</title>
<style>
  body {
    font-family: 'Georgia', serif;
    background-color: #2c3e50;
    color: #ecf0f1;
    margin: 0;
    padding: 2rem;
    text-align: center;
  }
  header {
    margin-bottom: 2rem;
  }
  img {
    max-width: 300px;
    border-radius: 10px;
  }
  p {
    max-width: 600px;
    margin: 1rem auto;
    line-height: 1.5;
    font-size: 1.1rem;
  }
</style>
</head>
<body>
  <header>
    <h1>Person You Admire</h1>
    <img src="admired-person.jpg" alt="Person you admire" />
  </header>
  <main>
    <p>This is the place to write what you adore about this person. Include stories, qualities, and impact.</p>
    <p>Adding images and paragraphs create a warm, engaging tribute.</p>
  </main>
</body>
</html>
